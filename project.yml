name: MWBClient
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.mwb.client
    INFOPLIST_FILE: MWBClient/App/Info.plist
    MARKETING_VERSION: "b1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MWBClient:
    type: application
    platform: macOS
    sources:
      - path: MWBClient
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: MWBClient
        PRODUCT_BUNDLE_IDENTIFIER: com.mwb.client
        INFOPLIST_FILE: MWBClient/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: MWBClient/App/MWBClient.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: false
    dependencies: []
    info:
      path: MWBClient/App/Info.plist
      properties:
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
    entitlements:
      path: MWBClient/App/MWBClient.entitlements

  MWBClientTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MWBClientTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MWBClient
    settings:
      base:
        PRODUCT_NAME: MWBClientTests
        PRODUCT_BUNDLE_IDENTIFIER: com.mwb.client.tests
        GENERATE_INFOPLIST_FILE: true
